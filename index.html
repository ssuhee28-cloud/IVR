<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객센터 IVR 관리 대시보드</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --line:#e3e6ea; --line2:#eef0f3;
    --text:#1f2329; --muted:#6b7280; --faint:#9aa1ab;
    --accent:#5b54c9; --accent-soft:#eeedfe; --accent-line:#cecbf6;
    --ok:#1d9e75; --ok-soft:#e1f5ee; --warn:#d4537e; --warn-soft:#fbeaf0;
    --info:#185fa5; --info-soft:#e6f1fb; --amber:#ba7517; --amber-soft:#faeeda;
    --radius:10px; --shadow:0 1px 2px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:13px}
  .app{display:flex;flex-direction:column;height:100vh}
  /* header */
  header.top{display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--panel);
    border-bottom:1px solid var(--line);box-shadow:var(--shadow);z-index:5}
  header.top h1{font-size:16px;font-weight:600;margin:0;white-space:nowrap}
  header.top .tag{font-size:11px;color:var(--muted);background:var(--line2);padding:2px 8px;border-radius:20px}
  .spacer{flex:1}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  .btn{border:1px solid var(--line);background:#fff;color:var(--text);padding:7px 12px;border-radius:8px;
    font-size:13px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn:hover{border-color:var(--accent-line);background:var(--accent-soft)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#4a43b8}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
  .btn.danger:hover{border-color:#f4c0d1;background:var(--warn-soft);color:var(--warn)}
  .btn.sm{padding:4px 8px;font-size:12px}
  /* tabs */
  nav.tabs{display:flex;gap:4px;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line)}
  nav.tabs .tab{padding:11px 14px;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
  nav.tabs .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  nav.tabs .badge{margin-left:6px;font-size:11px;background:var(--warn-soft);color:var(--warn);border-radius:20px;padding:1px 7px}
  /* main layout */
  .main{flex:1;display:flex;min-height:0}
  .sidebar{width:230px;border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;flex-shrink:0}
  .sidebar .shead{padding:10px 14px;font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center}
  .svc{padding:9px 14px;border-left:3px solid transparent;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .svc:hover{background:var(--line2)}
  .svc.active{background:var(--accent-soft);border-left-color:var(--accent)}
  .svc .nm{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .svc .sub{font-size:11px;color:var(--faint)}
  .svc .cnt{font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:20px;padding:1px 7px;flex-shrink:0}
  .content{flex:1;display:flex;min-width:0}
  .treepane{flex:1;overflow:auto;padding:16px 18px}
  .inspector{width:0;border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;flex-shrink:0;padding:0;opacity:0;transition:width .12s}
  .content.has-sel .inspector{width:370px;padding:16px;opacity:1}
  /* tree */
  .svc-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .svc-head .ph{font-size:12px;color:var(--muted)}
  .node{margin:2px 0}
  .node-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;border:1px solid transparent}
  .node-row:hover{background:var(--line2)}
  .node-row.sel{background:var(--accent-soft);border-color:var(--accent-line)}
  .twirl{width:16px;height:16px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:var(--faint);font-size:11px;cursor:pointer;user-select:none}
  .twirl.empty{visibility:hidden}
  .keycap{font-size:11px;min-width:20px;height:20px;padding:0 5px;display:inline-flex;align-items:center;justify-content:center;
    background:var(--text);color:#fff;border-radius:5px;font-weight:600;flex-shrink:0}
  .keycap.root{background:var(--accent)}
  .nlabel{font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chips{display:flex;gap:4px;flex-shrink:0}
  .chip{font-size:10px;padding:1px 6px;border-radius:20px;border:1px solid var(--line)}
  .chip.mem{background:var(--info-soft);color:var(--info);border-color:#b5d4f4}
  .chip.act{background:var(--line2);color:var(--muted)}
  .chip.warnflag{background:var(--warn-soft);color:var(--warn);border-color:#f4c0d1}
  .children{margin-left:22px;border-left:1px dashed var(--line);padding-left:6px}
  /* inspector */
  .insp-empty{color:var(--faint);font-size:13px;text-align:center;margin-top:40px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
  .field input,.field select,.field textarea{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:#fff}
  .field textarea{resize:vertical;min-height:54px;line-height:1.5}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .row2{display:flex;gap:8px}
  .row2>*{flex:1}
  .insp-title{font-size:13px;font-weight:600;margin:0 0 4px}
  .insp-path{font-size:11px;color:var(--faint);margin-bottom:14px;word-break:break-all}
  .entry-card{border:1px solid var(--line);border-radius:9px;padding:11px;margin-bottom:10px;background:var(--bg)}
  .entry-card .ehead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .entry-card .ehead b{font-size:12px}
  .sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin:18px 0 8px;border-top:1px solid var(--line2);padding-top:12px}
  .node-actions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  /* table view */
  table.grid{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff}
  table.grid th,table.grid td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
  table.grid th{background:var(--line2);position:sticky;top:0;font-weight:600;font-size:11px;color:var(--muted)}
  table.grid td.dim{color:var(--faint)}
  table.grid tr:hover td{background:#fafbfc}
  /* templates */
  .tplpane,.valpane{flex:1;overflow:auto;padding:18px 22px}
  .tpl-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;max-width:880px}
  .tpl-card .thead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px}
  .tpl-card .tname{font-size:13px;font-weight:600}
  .tpl-card .tno{font-size:11px;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:20px}
  .tpl-card .body{font-size:12.5px;color:#444;white-space:pre-wrap;background:var(--bg);border-radius:7px;padding:9px;max-height:140px;overflow:auto}
  .tpl-card .url{font-size:11.5px;color:var(--info);word-break:break-all;margin-top:7px}
  /* validation */
  .val-group{max-width:920px;margin-bottom:20px}
  .val-group h3{font-size:13px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
  .val-item{background:#fff;border:1px solid var(--line);border-left:3px solid var(--warn);border-radius:8px;padding:9px 12px;margin-bottom:6px;font-size:12.5px;display:flex;justify-content:space-between;gap:12px;cursor:pointer}
  .val-item:hover{background:var(--accent-soft)}
  .val-item.lv-info{border-left-color:var(--info)}
  .val-item.lv-warn{border-left-color:var(--amber)}
  .val-item.lv-err{border-left-color:var(--warn)}
  .val-item .loc{color:var(--faint);font-size:11px;white-space:nowrap}
  .val-ok{color:var(--ok);background:var(--ok-soft);border:1px solid #9fe1cb;border-radius:9px;padding:14px;max-width:920px}
  .count-pill{font-size:11px;border-radius:20px;padding:1px 9px}
  .pill-err{background:var(--warn-soft);color:var(--warn)}
  .pill-warn{background:var(--amber-soft);color:var(--amber)}
  .pill-info{background:var(--info-soft);color:var(--info)}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,24,33,.4);display:none;align-items:center;justify-content:center;z-index:50}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;padding:22px;width:480px;max-width:92vw;box-shadow:0 12px 40px rgba(0,0,0,.18)}
  .modal h2{font-size:15px;margin:0 0 14px}
  .modal .mrow{margin-bottom:12px}
  .modal label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .modal input,.modal select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px}
  .modal .mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
  .hint{font-size:11.5px;color:var(--muted);background:var(--info-soft);border:1px solid #b5d4f4;border-radius:8px;padding:8px 10px;margin-bottom:12px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;
    padding:10px 18px;border-radius:24px;font-size:13px;opacity:0;transition:opacity .2s;z-index:60;pointer-events:none}
  .toast.show{opacity:1}
  .muted{color:var(--muted)}
  .nowrap{white-space:nowrap}
  body.ro .edit-only{display:none !important}
  body.ro #inspector input, body.ro #inspector select, body.ro #inspector textarea,
  body.ro .tpl-card input, body.ro .tpl-card textarea,
  body.ro table.grid select, body.ro #svcName, body.ro #svcPhone{ pointer-events:none; background:var(--line2); color:var(--text); }
  .ro-badge{font-size:11px;color:var(--info);background:var(--info-soft);border:1px solid #b5d4f4;padding:2px 8px;border-radius:20px}
</style>
</head>

<div class="app">
  <header class="top">
    <h1>고객센터 IVR 관리</h1>
    <span class="tag" id="savedTag">자동 저장됨</span>
    <div class="spacer"></div>
    <div class="toolbar">
      <button class="btn sm edit-only" onclick="openBulk()">🔁 일괄 변경</button>
      <button class="btn sm edit-only" onclick="normalizeArrows()">↹ 표기 통일</button>
      <button class="btn sm primary edit-only" onclick="openPublish()">📤 공유본 발행</button>
      <button class="btn sm" onclick="exportCSV()">⬇ 엑셀(CSV)</button>
      <button class="btn sm" onclick="exportJSON()">⬇ 백업(JSON)</button>
      <button class="btn sm edit-only" onclick="document.getElementById('importFile').click()">⬆ 불러오기</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      <button class="btn sm ghost danger edit-only" onclick="resetData()">초기화</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="viz" onclick="vizModuleId=null;setView('viz')">IVR구조</button>
    <button class="tab" data-view="tree" onclick="setView('tree')">구조트리상세</button>
    <button class="tab" data-view="mod" onclick="modEditId=null;setView('mod')">공통 IVR</button>
    <button class="tab" data-view="lift" onclick="setView('lift')">리프트 전달용</button>
    <button class="tab" data-view="tpl" onclick="setView('tpl')">알림톡 템플릿</button>
    <button class="tab" data-view="table" onclick="setView('table')">IVR 요약표</button>
    <button class="tab" data-view="val" onclick="setView('val')">검증 <span class="badge" id="valBadge" style="display:none">0</span></button>
    <button class="tab" data-view="hist" onclick="setView('hist')">이력관리</button>
  </nav>

  <div class="main">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>

<script>
/* ---------- utilities ---------- */
const $ = s => document.querySelector(s);
let _uid = 1; const uid = () => 'n' + (_uid++);
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const LS_KEY = 'ivr_dashboard_state_v2';
const READONLY = true;

/* ---------- state ---------- */
let state = null;       // {services:[], templates:[], lift:[], modules:[]}
let view = 'viz';
let curServiceId = null;
let curNodeId = null;
let ctxKind = 'service';   // 'service' | 'module' — 편집 컨텍스트
let ctxModuleId = null;

/* ---------- normalization from raw excel extract ---------- */
function serviceNameFromSheet(sheet){
  return sheet.replace(/\s*IVR\s*$/i,'').trim() || sheet;
}
function buildTree(flat){
  const roots=[];
  for(const fn of (flat||[])){
    if(!fn.path || !fn.path.length){
      // path-less row: attach as root-level entry holder
      if(fn.action||fn.member||fn.detail){
        roots.push({id:uid(),num:fn.path&&fn.path[0]?fn.path[0].num:'',label:'(미분류)',depth:'',entries:[mkEntry(fn)],children:[]});
      }
      continue;
    }
    let level=roots, node=null;
    for(const seg of fn.path){
      node = level.find(n=>n.num===String(seg.num));
      if(!node){ node={id:uid(),num:String(seg.num),label:seg.label||'',depth:seg.depth||'',ment:'',entries:[],children:[]}; level.push(node); }
      else if(seg.label && !node.label){ node.label=seg.label; }
      level=node.children;
    }
    if(node && (fn.member||fn.action||fn.detail||fn.alimtalk||fn.url||fn.note)){
      node.entries.push(mkEntry(fn));
    }
  }
  return roots;
}
function mkEntry(fn){
  return {id:uid(),member:fn.member||'',action:fn.action||'',detail:fn.detail||'',alimtalk:fn.alimtalk||'',url:fn.url||'',note:fn.note||'',templateId:''};
}
const SERVICE_PROFILE = {
  '코나카드':['코나카드'], '경기지역화폐':['경기지역화폐'], '인천e음':['인천이음'],
  '그리고':['그리고'], '여민전':['여민전'], '상주':['상주화폐 알림'],
  '충주':['충주사랑상품권 알림'], '진천':['생거진천페이'], '양산':['양산사랑카드'],
  '천안 외 지역화폐':['천안사랑카드'], '오륙도 외 지역화폐':['오륙도페이','e바구페이'],
  '70대 이상':['경기지역화폐']
};
function normTxt(s){ return (s||'').replace(/\s+/g,'').replace(/[·,()\/]/g,'').toLowerCase(); }
function stripIvr(s){ return (s||'').replace(/^IVR_?\s*/,'').trim(); }
function normalizeRaw(raw, alim){
  alim = alim || {templates:[],lift:[]};
  const services=(raw.services||[]).map(s=>{
    const name=serviceNameFromSheet(s.sheet);
    return {id:uid(), name, sheet:s.sheet, file:s.file, phone:'',
      profiles:(SERVICE_PROFILE[name]||[]).slice(),
      note:s.entry||'', tree:buildTree(s.nodes)};
  });
  const templates=(alim.templates||[]).map(t=>({
    id:uid(), profile:t.profile||'', ivrNo:t.ivrNo||'', uuid:t.uuid||'', code:t.code||'',
    name:t.name||'', body:t.body||'', btn1:t.btn1||'', btn1Url:t.btn1Url||'', btn2:t.btn2||'', btn2Url:t.btn2Url||''
  }));
  const st={services, templates, lift:(alim.lift||[]), modules:[], history:[]};
  restructureRegions(st);
  applyFigmaMemos(st);
  applyMents(st);
  applyPhones(st, phoneData());
  autoLink(st);
  applyCommonModules(st);
  return st;
}
function labelSet(arr){ return arr.map(n=>(n.label||'').trim()).sort().join('|'); }
function applyCommonModules(st){
  if(!st.modules) st.modules=[];
  if(st.modules.length) return; // 이미 공통 IVR이 있으면 건너뜀(멱등)
  const region=st.services.filter(s=>isRegionService(s) && s.name!=='상주');
  const stripClone=arr=>{ const c=cloneNodes(arr); (function w(l){ for(const n of l){ (n.entries||[]).forEach(e=>{e.templateId='';e.url='';}); w(n.children||[]); } })(c); return c; };
  const DEFS=[
    {re:/고유가/, name:'고유가 피해지원금 안내', desc:'2차 고유가 피해지원금 하위 안내 (지역화폐 공통)'},
    {re:/카드 신청, 배송 및 등록|카드 신청.*배송.*등록/, name:'카드 신청·배송·등록 흐름', desc:'카드 신청/재발급·배송·등록 등 (지역화폐 공통)'},
    {re:/분실 신고/, name:'분실 신고·해제 흐름', desc:'분실 신고/해제 (회원·비회원) (지역화폐 공통)'},
    {re:/서비스 이용 및 거래/, name:'서비스 이용·거래 안내 흐름', desc:'서비스이용·인센티브·상담원 등 (지역화폐 공통)'}
  ];
  for(const d of DEFS){
    const cands=[]; region.forEach(s=>walk(s.tree,n=>{ if(d.re.test(n.label) && n.children.length) cands.push(n); }));
    if(cands.length<2) continue;
    const groups={}; cands.forEach(n=>{ const k=labelSet(n.children); (groups[k]=groups[k]||[]).push(n); });
    let best=null; for(const k in groups){ if(groups[k].length>=2 && (!best||groups[k].length>best.length)) best=groups[k]; }
    if(!best) continue;
    const m={id:uid(),name:d.name,desc:d.desc,tree:stripClone(best[0].children)};
    best.forEach(n=>{ n.children=[]; n.moduleRef=m.id; });
    st.modules.push(m);
  }
}
const GOYUGA_SUBS=[['1','신청 방법 및 조회'],['2','지급 일정과 지급금액'],['3','지급 대상'],['4','잔액조회'],['5','사용처 및 유효기간 문의'],['6','신청 오류 및 지급 오류'],['7','이의신청 문의'],['8','알림톡 또는 메시지 수신 차단/미수신 문의']];
function applyFigmaMemos(st){
  for(const s of st.services){
    // #2 상주는 해당 IVR 적용 제외
    if(s.name==='상주'){ s.excludedIVR=true; s.tree=s.tree.filter(n=>!/고유가/.test(n.label)); continue; }
    // #1 고유가 피해지원금 하위 메뉴 전개 (Figma 기준)
    const goyuga=s.tree.find(n=>/고유가/.test(n.label));
    if(goyuga && goyuga.children.length===0){
      goyuga.entries=[];
      goyuga.children=GOYUGA_SUBS.map(([num,lbl])=>({id:uid(),num,label:lbl,depth:'2DEPTH',ment:'',
        entries:[{id:uid(),member:'전체',action:'안내멘트 → 알림톡 발송 → FAQ',detail:'',url:'',note:'',templateId:''}],children:[]}));
    }
    // #3 '그리고' ASP는 충전 취소 안내 없음
    if(s.name==='그리고'){ const rm=list=>list.filter(n=>{ n.children=rm(n.children); return !/충전\s*취소/.test(n.label); }); s.tree=rm(s.tree); }
    // #4 경기·인천: 유효기간 연장 → 자동연장 안내
    if(s.name==='경기지역화폐'||s.name==='인천e음'){ walk(s.tree,n=>{ if(/유효기간\s*연장/.test(n.label)) n.label='카드 유효기간 자동연장 안내'; }); }
  }
}
const MENT_SEED=[
  {scope:'region', label:'서비스 이용 및 거래 안내', ment:'서비스 이용 안내는 1번,\n인센티브·캐시백 안내는 2번,\n오류 문의는 3번을 눌러주세요.\n다시듣기는 별표(*)를, 이전단계로 가시려면 샾(#) 버튼을 눌러주세요.'},
  {scope:'kona', label:'서비스 이용 및 거래 안내', ment:'서비스이용 안내는 1번,\n회원정보 관련 문의는 2번,\n상담원 연결은 3번을 눌러주세요.\n다시듣기는 별표(*)를, 이전단계로 가시려면 샾(#) 버튼을 눌러주세요.'},
  {scope:'senior', label:'서비스 이용 및 거래 안내', ment:'인센티브·캐시백 안내는 1번,\n기타 문의는 2번을 눌러주세요.\n다시듣기는 별표(*)를, 이전단계로 가시려면 샾(#) 버튼을 눌러주세요.'},
  {scope:'region', label:'고유가 피해지원금(변동성)', ment:'신청 방법 및 조회는 1번,\n지급 일정과 지급금액은 2번,\n지급 대상은 3번,\n잔액조회는 4번,\n사용처 및 유효기간 문의는 5번,\n신청 오류 및 지급 오류는 6번,\n이의신청 문의는 7번,\n알림톡 수신 차단/미수신 문의는 8번을 눌러주세요.\n※ 평상시 5번 배치, 월초 정책변경 시기에는 첫 번째로 안내(변동성).'}
];
function mentScope(s){ if(s.name==='코나카드')return 'kona'; if(s.name==='70대 이상')return 'senior'; if(isRegionService(s))return 'region'; return ''; }
function applyMents(st){
  for(const s of st.services){
    const sc=mentScope(s); if(!sc) continue;
    walk(s.tree, n=>{
      if(n.ment) return;
      const hit=MENT_SEED.find(m=>m.scope===sc && m.label===n.label);
      if(hit) n.ment=hit.ment;
    });
  }
}
function isRegionService(s){ return s.name!=='코나카드' && s.name!=='변경안' && s.name!=='70대 이상'; }
function restructureRegions(st){
  for(const s of st.services){
    if(!isRegionService(s) || s.name==='상주') continue;
    const roots=s.tree;
    let chatbot=roots.find(n=>/챗봇/.test(n.label));
    let general=roots.find(n=>/지역화폐\s*문의/.test(n.label));
    let goyuga=roots.find(n=>/고유가/.test(n.label));
    if(!general){
      const items=roots.filter(n=>n!==chatbot && n!==goyuga);
      general={id:uid(),num:'2',label:'일반지역화폐 문의',depth:'1DEPTH',ment:'',entries:[],children:items};
    }
    if(!chatbot){
      chatbot={id:uid(),num:'3',label:'대기없는 챗봇 상담',depth:'1DEPTH',ment:'',
        entries:[{id:uid(),member:'전체',action:'안내멘트 → 알림톡',detail:'AI 챗봇 상담을 위한 알림톡 발송',url:'',note:'',templateId:''}],children:[]};
    }
    if(!goyuga){
      goyuga={id:uid(),num:'1',label:'고유가 피해지원금(변동성)',depth:'1DEPTH',ment:'',
        entries:[{id:uid(),member:'전체',action:'상담원 연결',detail:'고유가 피해지원금 안내 후 상담원 연결',url:'',note:'변동성 캠페인 메뉴',templateId:''}],children:[]};
    }
    goyuga.num='1'; general.num='2'; chatbot.num='3';
    s.tree=[goyuga, general, chatbot];
  }
}
function applyPhones(st, phone){
  const rows=(phone&&phone.rows)||[]; if(!rows.length) return;
  const byUuid={}, byName={};
  rows.forEach(r=>{ if(r.profile) byUuid[r.profile]=r.phone||''; if(r.serviceName) byName[normTxt(r.serviceName)]=r.phone||''; });
  // profile(업체명) -> phone, bridged via a template's uuid
  const profPhone={};
  st.templates.forEach(t=>{ if(t.profile && t.uuid && byUuid[t.uuid]!=null && !profPhone[t.profile]) profPhone[t.profile]=byUuid[t.uuid]; });
  for(const s of st.services){
    if(s.phone) continue;
    const p=(s.profiles||[])[0];
    let ph = (p && profPhone[p]) || byName[normTxt(s.name)] || (p?byName[normTxt(p)]:'') || '';
    if(ph) s.phone=ph;
  }
}
function leafPaths(tree){ // .children only (공통 IVR 미전개) — autoLink용
  const out=[];
  const rec=(list,labels)=>{ for(const n of list){ const lb=[...labels,n.label];
    if(!n.children.length){ out.push({node:n, menu:lb[1]||'', sub:lb[2]||''}); }
    rec(n.children,lb); } };
  rec(tree,[]); return out;
}
function leafPathsEff(tree){ // effChildren(공통 IVR 전개) — 리프트/표시용
  const out=[];
  const rec=(list,labels)=>{ for(const n of list){ const lb=[...labels,n.label]; const kids=effChildren(n);
    if(!kids.length){ out.push({node:n, menu:lb[1]||'', sub:lb[2]||''}); }
    rec(kids,lb); } };
  rec(tree,[]); return out;
}
function tplUrl(t){ if(!t)return ''; if(t.btn1Url)return t.btn1Url; if(t.btn2Url)return t.btn2Url;
  const m=(t.body||'').match(/https?:\/\/[^\s)]+/); return m?m[0].replace(/[.,]+$/,''):''; }
const MATCH_KW=['잔액','사용내역','사용 및 충전','충전 방법','충전방법','충전 취소','충전취소','결제','분실신고 해제','분실신고','분실 신고','분실','신고해제','카드 신청','재발급','카드 배송','배송','카드 등록','등록','유효기간','자동연장','서비스 이용','회원정보','상담원','제휴','가맹점','정책수당','인센티브','캐시백','오류','챗봇','신청 방법','지급 일정','지급 대상','이의신청','수신 차단','수신차단'];
function bestTemplate(profT, menu, sub, label){
  if(!profT.length) return null;
  const target=normTxt(sub||label);
  // 1) exact stripped-name match
  let hit=profT.find(t=>normTxt(stripIvr(t.name))===target); if(hit) return hit;
  // 2) containment both ways
  hit=profT.find(t=>{ const nm=normTxt(stripIvr(t.name)); return target && nm && (nm.includes(target)||target.includes(nm)); }); if(hit) return hit;
  // 3) keyword scoring against name+ivrNo using menu+sub+label
  const src=normTxt(menu+' '+sub+' '+label);
  let best=null,bs=0;
  for(const t of profT){ const tt=normTxt(stripIvr(t.name)+' '+(t.ivrNo||'')); let sc=0;
    for(const k of MATCH_KW){ const kk=normTxt(k); if(kk.length>=2 && src.includes(kk) && tt.includes(kk)) sc+=kk.length; }
    if(sc>bs){ bs=sc; best=t; } }
  return bs>=4?best:null;
}
function autoLink(st){
  const codeToTpl={}; st.templates.forEach(t=>{ if(t.code) codeToTpl[t.code]=t; });
  const liftMap={}; (st.lift||[]).forEach(l=>{ if(l.code) liftMap[normTxt(l.menu)+'|'+normTxt(l.sub)]=l.code; });
  for(const s of st.services){
    const primary=s.profiles[0]; if(!primary) continue;
    const profT=st.templates.filter(t=>t.profile===primary);
    for(const lp of leafPaths(s.tree)){
      if(!lp.node.entries.length) continue;
      let tpl=null;
      // 1) 코나카드 lift form (authoritative)
      const code=liftMap[normTxt(lp.menu)+'|'+normTxt(lp.sub)] || liftMap[normTxt(lp.menu)+'|'];
      if(code && codeToTpl[code] && codeToTpl[code].profile===primary) tpl=codeToTpl[code];
      // 2) name/keyword match within profile
      if(!tpl) tpl=bestTemplate(profT, lp.menu, lp.sub, lp.node.label);
      if(tpl){ const u=tplUrl(tpl); lp.node.entries.forEach(e=>{ if(!e.templateId){ e.templateId=tpl.id; if(!e.url && u) e.url=u; } }); }
    }
  }
}

function reseedUid(){
  // ensure uid counter is beyond existing ids
  let max=0;
  const scan=o=>{ if(!o)return; if(typeof o.id==='string'){const m=/^n(\d+)$/.exec(o.id);if(m)max=Math.max(max,+m[1]);}
    for(const k in o){ if(o[k]&&typeof o[k]==='object') scan(o[k]); } };
  scan(state); _uid=max+1;
}

/* ---------- tree helpers ---------- */
function curService(){ return state.services.find(s=>s.id===curServiceId); }
function modules(){ return state.modules||(state.modules=[]); }
function findModule(id){ return modules().find(m=>m.id===id); }
function ctxOwner(){ return ctxKind==='module' ? findModule(ctxModuleId) : curService(); }
function ctxTree(){ const o=ctxOwner(); return o?o.tree:[]; }
function effChildren(n){ if(n.moduleRef){ const m=findModule(n.moduleRef); return m?m.tree:[]; } return n.children; }
function walk(nodes,fn,parent=null){ for(const n of nodes){ fn(n,parent,nodes); walk(n.children,fn,n);} }
function findNode(id){ let res=null;
  const scan=t=>{ walk(t,(n)=>{if(n.id===id)res=n;}); };
  for(const s of state.services){ scan(s.tree); if(res)return res; }
  for(const m of modules()){ scan(m.tree); if(res)return res; }
  return res; }
function findParentList(serviceTree,id){ // returns {list, index, parent}
  let out=null;
  const rec=(list,parent)=>{ for(let i=0;i<list.length;i++){ if(list[i].id===id){out={list,index:i,parent};return;} rec(list[i].children,list[i]); if(out)return; } };
  rec(serviceTree,null); return out;
}
function moduleUsage(modId){ let c=0; state.services.forEach(s=>walk(s.tree,n=>{if(n.moduleRef===modId)c++;})); modules().forEach(m=>walk(m.tree,n=>{if(n.moduleRef===modId)c++;})); return c; }
function leafCount(nodes){ let c=0; walk(nodes,(n)=>{ if(!effChildren(n).length) c++; }); return c; }
function entryCount(nodes){ let c=0; walk(nodes,(n)=>{ c+=n.entries.length; }); return c; }

function nodeHtml(n,isRoot){

  if(hasKids && open){ h+=`<div class="children"${mod?' style="opacity:.85"':''}>`+kids.map(c=>nodeHtml(c,false)).join('')+`</div>`; }
  h+=`</div>`;
  return h;
}

function pathLabel(id){
  const o=ctxOwner(); if(!o)return ''; let chain=[];
  const rec=(list,acc)=>{ for(const n of list){ const a=[...acc,`${n.num} ${n.label}`]; if(n.id===id){chain=a;return true;} if(rec(n.children,a))return true; } return false; };
  rec(o.tree,[o.name||'공통 IVR']); return chain.join('  ›  ');
}

function allProfiles(){ return [...new Set(state.templates.map(t=>t.profile).filter(Boolean))].sort(); }
function addProfile(p){ if(!p)return; const s=curService(); if(!s.profiles)s.profiles=[]; if(!s.profiles.includes(p))s.profiles.push(p); renderTreeView($('#content')); save(); }
function rmProfile(p){ const s=curService(); s.profiles=(s.profiles||[]).filter(x=>x!==p); renderTreeView($('#content')); save(); }
function setNodeField(id,f,v){ findNode(id)[f]=v; renderTreeBody(); renderInspector(); save(); refreshValBadge(); }
function setEntry(nodeId,eid,f,v){ const n=findNode(nodeId); const e=n.entries.find(x=>x.id===eid); e[f]=v;
  if(f==='templateId'){ const t=state.templates.find(x=>x.id===v); const u=tplUrl(t); if(u) e.url=u; }
  renderTreeBody(); renderInspector(); save(); refreshValBadge(); }
function addEntry(id){ findNode(id).entries.push({id:uid(),member:'전체',cond:'',action:'',detail:'',url:'',note:'',templateId:''}); renderInspector(); renderTreeBody(); save(); }
function delEntry(nodeId,eid){ const n=findNode(nodeId); n.entries=n.entries.filter(e=>e.id!==eid); renderInspector(); renderTreeBody(); save(); }
function newNode(){ return {id:uid(),num:'',label:'새 메뉴',depth:'',ment:'',branch:'',entries:[],children:[]}; }
function addChild(id){ const n=findNode(id); if(n.moduleRef){toast('공통 IVR 참조 노드에는 하위를 추가할 수 없습니다. 공통 IVR을 편집하세요.');return;} const c=newNode(); c.num=String(n.children.length+1); n.children.push(c); n._collapsed=false; curNodeId=c.id; renderTreeBody(); renderInspector(); save(); }
function addSibling(id){ const loc=findParentList(ctxTree(),id); if(!loc)return; const c=newNode(); c.num=String(loc.list.length+1); loc.list.splice(loc.index+1,0,c); curNodeId=c.id; renderTreeBody(); renderInspector(); save(); }
function addRoot(){ const c=newNode(); c.num=String(ctxTree().length+1); ctxTree().push(c); curNodeId=c.id; renderTreeBody(); renderInspector(); save(); }
function deleteNode(id){ const n=findNode(id); const kids=n.children.length, ents=n.entries.length;
  if((kids||ents||n.moduleRef) && !confirm(`‘${n.label}’ 및 하위/처리를 삭제할까요?`)) return;
  const loc=findParentList(ctxTree(),id); if(!loc)return; loc.list.splice(loc.index,1); curNodeId=null; $('#content').classList.remove('has-sel'); renderTreeBody(); renderInspector(); save(); refreshValBadge(); }
function moveNode(id,dir){ const loc=findParentList(ctxTree(),id); if(!loc)return; const j=loc.index+dir; if(j<0||j>=loc.list.length)return; const t=loc.list[loc.index]; loc.list[loc.index]=loc.list[j]; loc.list[j]=t; renderTreeBody(); save(); }
function addService(){ const name=prompt('새 서비스 이름','새 서비스'); if(!name)return; const s={id:uid(),name,sheet:name,file:'(신규)',phone:'',note:'',tree:[]}; state.services.push(s); curServiceId=s.id; curNodeId=null; renderAll(); save(); }
function deleteService(){ if(!confirm(`서비스 ‘${curService().name}’ 전체를 삭제할까요?`))return; state.services=state.services.filter(s=>s.id!==curServiceId); curServiceId=state.services[0]?.id||null; curNodeId=null; renderAll(); save(); }

/* ---------- modules (reusable flows) ---------- */
let modEditId=null;
function cloneNodes(arr){ const c=JSON.parse(JSON.stringify(arr)); (function w(l){ for(const n of l){ n.id=uid(); (n.entries||[]).forEach(e=>e.id=uid()); w(n.children||[]); } })(c); return c; }
function createModule(name,treeNodes,desc){ const m={id:uid(),name:name||'새 공통 IVR',desc:desc||'',tree:treeNodes||[]}; modules().push(m); return m; }
function setModuleField(f,v){ const m=findModule(modEditId); if(m){ m[f]=v; save(); } }
function newModulePrompt(){ const name=prompt('새 공통 IVR 이름','새 공통 IVR'); if(!name)return; const m=createModule(name,[],''); save(); modEditId=m.id; renderModules($('#content')); }
function editModuleFromList(id){ modEditId=id; curNodeId=null; renderModules($('#content')); }
function editModule(id){ modEditId=id; curNodeId=null; setView('mod'); }
function exitModuleEdit(){ modEditId=null; ctxKind='service'; ctxModuleId=null; curNodeId=null; renderModules($('#content')); }
function deleteModule(id){ const u=moduleUsage(id); if(u && !confirm(`${u}곳에서 사용 중입니다. 삭제하면 그 참조가 끊깁니다. 계속할까요?`))return; if(!u && !confirm('이 공통 IVR을 삭제할까요?'))return;
  state.modules=modules().filter(m=>m.id!==id);
  const clr=t=>walk(t,n=>{ if(n.moduleRef===id){ n.moduleRef=''; } });
  state.services.forEach(s=>clr(s.tree)); modules().forEach(m=>clr(m.tree));
  if(modEditId===id)modEditId=null; renderModules($('#content')); save(); }
function extractModule(nodeId){ const n=findNode(nodeId); if(!n.children.length){toast('하위 흐름이 있어야 공통 IVR로 추출됩니다');return;}
  const name=prompt('공통 IVR 이름을 입력하세요',n.label||'공통 IVR'); if(!name)return;
  const owner=ctxOwner(); const m=createModule(name,n.children,(owner?owner.name:'')+' › '+n.label);
  n.children=[]; n.moduleRef=m.id; renderTreeBody(); renderInspector(); save(); toast(`‘${name}’ 공통 IVR로 추출했습니다`); }
function insertModuleRef(parentId){ if(!modules().length){ toast('먼저 공통 IVR을 만들거나 다른 메뉴에서 공통 IVR로 추출하세요'); return; }
  const pick=prompt('삽입할 공통 IVR 번호:\n'+modules().map((m,i)=>`${i+1}. ${m.name}`).join('\n')); const m=modules()[parseInt(pick,10)-1]; if(!m)return;
  const p=findNode(parentId); const c=newNode(); c.label=m.name; c.num=String(p.children.length+1); c.moduleRef=m.id; c.entries=[]; c.children=[];
  p.children.push(c); p._collapsed=false; curNodeId=c.id; renderTreeBody(); renderInspector(); save(); toast('공통 IVR 참조를 추가했습니다'); }
function detachModule(nodeId){ if(!confirm('참조를 해제하고 현재 공통 IVR 내용을 이 노드에 독립 복사할까요?'))return; const n=findNode(nodeId); const m=findModule(n.moduleRef); n.children=cloneNodes(m?m.tree:[]); n.moduleRef=''; renderTreeBody(); renderInspector(); save(); toast('참조 해제 후 복사했습니다'); }
function renderModules(c){
  if(modEditId){ renderModuleEditor(c); return; }
  ctxKind='service'; ctxModuleId=null;
  c.className='content';
  c.innerHTML=`<div class="valpane">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
      <b style="font-size:15px">공통 IVR (${modules().length})</b>
      <span class="muted" style="font-size:12px">여러 서비스가 함께 쓰는 공통 흐름. 공통 IVR을 고치면 사용하는 모든 곳에 반영됩니다.</span>
      <div class="spacer" style="flex:1"></div>
      <button class="btn sm primary edit-only" onclick="newModulePrompt()">+ 새 공통 IVR</button>
    </div>
    <div class="hint" style="max-width:920px">‘구조트리상세’에서 메뉴를 선택해 <b>이 흐름을 공통 IVR로 추출</b>하거나, <b>+ 공통 IVR 삽입(하위)</b>으로 기존 공통 IVR을 가져다 쓸 수 있습니다.</div>
    ${modules().length? modules().map(m=>`
      <div class="tpl-card" style="max-width:920px">
        <div class="thead"><span class="tname">📦 ${esc(m.name)}</span>
          <span class="count-pill pill-info">사용 ${moduleUsage(m.id)}곳</span>
          <div class="spacer" style="flex:1"></div>
          <button class="btn sm" onclick="toggleModStruct('${m.id}')">${modExpanded.has(m.id)?'▾ 구조 접기':'▸ 구조 보기'}</button>
          <button class="btn sm" onclick="viewModuleDiagram('${m.id}')">다이어그램</button>
          <button class="btn sm edit-only" onclick="editModuleFromList('${m.id}')">편집</button>
          <button class="btn sm ghost danger edit-only" onclick="deleteModule('${m.id}')">삭제</button>
        </div>
        <div class="muted" style="font-size:12px">${esc(m.desc||'')} · 흐름 ${m.tree.length}개</div>
        ${modExpanded.has(m.id)?`<div style="margin-top:8px;border-top:1px solid var(--line2);padding-top:8px">${moduleStructHtml(m.tree,0)}</div>`:''}
      </div>`).join('') : '<div class="insp-empty">아직 공통 IVR이 없습니다. 구조트리상세에서 공통 흐름을 공통 IVR로 추출해 보세요.</div>'}
  </div>`;
}
const modExpanded=new Set();
function toggleModStruct(id){ if(modExpanded.has(id))modExpanded.delete(id); else modExpanded.add(id); renderModules($('#content')); }
function viewModuleDiagram(id){ vizModuleId=id; setView('viz'); }
function moduleStructHtml(nodes,depth){
  return (nodes||[]).map(n=>{
    const kids=effChildren(n); const ck=nodeCatKey(n);
    const cat=(n.entries.length&&ck!=='none')?`<span class="chip" style="background:${CAT[ck].bg};color:${CAT[ck].tx};border-color:${CAT[ck].bd}">${CAT[ck].label}</span>`:'';
    const mem=[...new Set(n.entries.map(e=>e.member).filter(Boolean))].map(x=>`<span class="chip mem">${esc(x)}</span>`).join('');
    const br=n.branch?`<span class="chip" style="background:#fef0d8;color:#854f0b;border-color:#fac775">⑂ ${esc(n.branch)}</span>`:'';
    const sub=findModule(n.moduleRef);
    return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0;padding-left:${depth*20}px">
        <span class="keycap" style="background:${depth===0?'var(--accent)':'var(--text)'}">${esc(n.num||'·')}</span>
        <span style="font-size:12.5px">${esc(n.label||'(이름없음)')}</span>${br}${mem}${cat}
        ${sub?`<span class="chip" style="background:var(--ok-soft);color:var(--ok);border-color:#9fe1cb">📦 ${esc(sub.name)}</span>`:''}
      </div>`+(kids.length&&!n.moduleRef?moduleStructHtml(kids,depth+1):'');
}).join('');
}
function renderModuleEditor(c){
  const m=findModule(modEditId); if(!m){ modEditId=null; renderModules(c); return; }
  ctxKind='module'; ctxModuleId=m.id;
  c.className='content'+(curNodeId?' has-sel':'');
  c.innerHTML=`<div class="treepane" id="treepane"></div><div class="inspector" id="inspector"></div>`;
  $('#treepane').innerHTML=`<div class="svc-head">
      <button class="btn sm" onclick="exitModuleEdit()">← 공통 IVR 목록</button>
      <span class="keycap root">📦</span>
      <input id="svcName" value="${esc(m.name)}" style="font-size:15px;font-weight:600;border:1px solid transparent;padding:3px 6px;border-radius:6px;width:200px" onchange="setModuleField('name',this.value)">
      <input value="${esc(m.desc||'')}" placeholder="설명" style="font-size:12px;border:1px solid var(--line);padding:3px 8px;border-radius:6px;width:220px" onchange="setModuleField('desc',this.value)">
      <span class="ph">사용 ${moduleUsage(m.id)}곳 · 흐름 ${m.tree.length}</span>
      <div class="spacer"></div>
      <button class="btn sm edit-only" onclick="addRoot()">+ 흐름 추가</button>
    </div><div id="treebody"></div>`;
  renderTreeBody(); renderInspector();
}

/* ---------- table view ---------- */
function flatten(service){
  const rows=[];
  const rec=(list,path)=>{ for(const n of list){ const p=[...path,{num:n.num,label:n.label}]; const kids=effChildren(n);
    if(n.entries.length){ n.entries.forEach(e=>rows.push({path:p,e,node:n})); }
    else if(!kids.length){ rows.push({path:p,e:null,node:n}); }
    rec(kids,p); } };
  rec(service.tree,[]); return rows;
}
function maxDepth(service){ let m=0; const rec=(l,d)=>{ for(const n of l){ m=Math.max(m,d); rec(effChildren(n),d+1);} }; rec(service.tree,1); return m; }
function renderTableView(c){
  const s=curService();
  if(!s){ c.innerHTML='<div class="treepane"><div class="insp-empty">서비스를 선택하세요.</div></div>'; return; }
  const md=Math.max(maxDepth(s),1); const rows=flatten(s);
  let head='';
  for(let d=1;d<=md;d++) head+=`<th>${d}D 번호</th><th>${d}D 항목</th>`;
  head+='<th>분기조건</th><th>멘트</th><th>회원</th><th>조건값</th><th>Action</th><th>실행 상세</th><th>템플릿코드</th><th>URL</th>';
  let body='';
  for(const r of rows){
    let tds='';
    for(let d=1;d<=md;d++){ const seg=r.path[d-1]; tds+=`<td class="nowrap ${seg?'':'dim'}">${seg?esc(seg.num):''}</td><td class="${seg?'':'dim'}">${seg?esc(seg.label):''}</td>`; }
    const e=r.e;
    const tpl=e&&e.templateId?state.templates.find(t=>t.id===e.templateId):null;
    tds+=`<td class="nowrap dim">${esc(r.node.branch||'')}</td>
      <td class="dim" style="max-width:160px">${esc((r.node.ment||'').slice(0,40))}</td>
      <td class="nowrap">${e?esc(e.member):'<span class="dim">처리없음</span>'}</td>
      <td class="dim nowrap">${e?esc(e.cond||''):''}</td>
      <td>${e?esc(e.action):''}</td>
      <td class="dim">${e?esc((e.detail||'').slice(0,60)):''}</td>
      <td class="nowrap">${tpl?esc(tpl.code||stripIvr(tpl.name)):'<span class="dim">미지정</span>'}</td>
      <td class="dim" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${e?esc(e.url):''}</td>`;
    body+=`<tr>${tds}</tr>`;
  }
  c.innerHTML=`<div class="treepane" style="padding:0"><div style="padding:14px 18px"><b>${esc(s.name)}</b> <span class="muted">· ${rows.length}행</span></div>
    <div style="padding:0 18px 24px"><table class="grid"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></div>`;
}

/* ---------- 처리 유형 분류 (상담원 / IVR 자체해결(API) / 알림톡) ---------- */
const CAT={
  agent:{label:'상담원 연결',bg:'#fbeaf0',bd:'#d4537e',tx:'#72243e'},
  api:{label:'IVR 자체해결(API)',bg:'#e6f1fb',bd:'#378add',tx:'#0c447c'},
  talk:{label:'알림톡 발송',bg:'#eeedfe',bd:'#7f77dd',tx:'#3c3489'},
  none:{label:'',bg:'#ffffff',bd:'#cfd3da',tx:'#3a3f47'}
};
function actCatKey(action){ const a=action||''; if(/상담원/.test(a))return 'agent'; if(/ARS|API/.test(a))return 'api'; if(/알림톡/.test(a))return 'talk'; return ''; }
function nodeCatKey(n){ const ks=n.entries.map(e=>actCatKey(e.action)).filter(Boolean);
  if(ks.includes('agent'))return 'agent'; if(ks.includes('api'))return 'api'; if(ks.includes('talk'))return 'talk'; return 'none'; }
function vizColor(n){ if(effChildren(n).length && !n.entries.length) return CAT.none; return CAT[nodeCatKey(n)]; }
let vizModuleId=null;
function renderViz(c){
  const isMod=!!vizModuleId;
  const s=isMod?findModule(vizModuleId):curService();
  if(!s){ if(isMod){vizModuleId=null;} c.innerHTML='<div class="treepane"><div class="insp-empty">'+(isMod?'공통 IVR을 찾을 수 없습니다.':'왼쪽에서 서비스를 선택하세요.')+'</div></div>'; return; }
  const ROWH=66,BOXH=54,BOXW=224,COLW=266,PADX=24,PADY=24;
  let yc=0; const nodes=[];
  function layout(n,depth,prefix){
    n.__code = prefix ? prefix+'-'+(n.num||'?') : (n.num||'?');
    const kids=effChildren(n); let y; const collapsed=n._collapsed===true;
    if(collapsed || !kids.length){ y=yc; yc+=ROWH; }
    else { const ys=kids.map(ch=>layout(ch,depth+1,n.__code)); y=(ys[0]+ys[ys.length-1])/2; }
    n.__x=PADX+depth*COLW; n.__y=PADY+y; nodes.push(n); return y;
  }
  s.tree.forEach(r=>layout(r,0,''));
  const md=Math.max(maxDepth(s),1);
  const W=PADX*2+(md-1)*COLW+BOXW, H=PADY*2+Math.max(yc,ROWH);
  let edges='';
  nodes.forEach(n=>{ if(n._collapsed!==true){ effChildren(n).forEach(ch=>{
    const x1=n.__x+BOXW,y1=n.__y+BOXH/2,x2=ch.__x,y2=ch.__y+BOXH/2,mx=(x1+x2)/2;
    edges+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="#cdd2da" stroke-width="1.5"/>`;
  }); } });
  let boxes='';
  nodes.forEach(n=>{
    const kids=effChildren(n); const col=vizColor(n), hasKids=kids.length>0, collapsed=n._collapsed===true;
    const mod=n.moduleRef?findModule(n.moduleRef):null;
    const mem=[...new Set(n.entries.map(e=>e.member).filter(Boolean))];
    const ck=nodeCatKey(n); const catTxt=mod?('📦 '+mod.name):(hasKids&&!n.entries.length?(collapsed?'▸ 펼치기':kids.length+'개 하위'):(CAT[ck].label||''));
    const lbl=esc((n.branch?'⑂ ':'')+((n.label||'').length>17?n.label.slice(0,16)+'…':(n.label||'(이름없음)')));
    boxes+=`<g style="cursor:pointer" onclick="vizToggle('${n.id}')">
      <rect x="${n.__x}" y="${n.__y}" width="${BOXW}" height="${BOXH}" rx="9" fill="${col.bg}" stroke="${mod?'#1d9e75':col.bd}" stroke-width="1.5"${mod?' stroke-dasharray="4 2"':''}/>
      <rect x="${n.__x}" y="${n.__y}" width="5" height="${BOXH}" rx="2.5" fill="${mod?'#1d9e75':col.bd}"/>
      <text x="${n.__x+14}" y="${n.__y+16}" font-size="10" font-weight="600" fill="#8a8f98">IVR ${esc(n.__code)}</text>
      <text x="${n.__x+14}" y="${n.__y+33}" font-size="12.5" font-weight="600" fill="${col.tx}">${lbl}</text>
      <text x="${n.__x+14}" y="${n.__y+48}" font-size="10" fill="#6b7280">${esc(catTxt)}${mem.length?'  ['+esc(mem.join('/'))+']':''}</text>
      ${n.ment?`<text x="${n.__x+BOXW-(hasKids?24:11)}" y="${n.__y+16}" text-anchor="end" font-size="11">🔊</text>`:''}
      ${hasKids?`<circle cx="${n.__x+BOXW}" cy="${n.__y+BOXH/2}" r="8" fill="#fff" stroke="${mod?'#1d9e75':col.bd}" stroke-width="1.5"/><text x="${n.__x+BOXW}" y="${n.__y+BOXH/2+4}" text-anchor="middle" font-size="13" fill="${mod?'#1d9e75':col.bd}">${collapsed?'+':'–'}</text>`:''}
    </g>`;
  });
  c.innerHTML=`<div class="treepane" style="padding:0">
    <div style="padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line2)">
      ${isMod?`<button class="btn sm" onclick="vizModuleId=null;setView('mod')">← 공통 IVR 목록</button>`:''}
      <b style="font-size:15px">${isMod?'📦 ':''}${esc(s.name)}</b>${isMod?`<span class="muted" style="font-size:12px">${esc(s.desc||'')} · 사용 ${moduleUsage(s.id)}곳</span>`:`<span class="muted" style="font-size:12px">${esc(s.phone||'')}</span>`}
      <span class="ph" style="font-size:11px">${isMod?'공통 IVR 흐름 구조 · 노드 클릭=펼치기/접기':"박스의 'IVR n-n'은 누르는 번호 경로 · 노드 클릭=펼치기/접기"}</span>
      <div class="spacer" style="flex:1"></div>
      <span class="chip" style="background:${CAT.agent.bg};color:${CAT.agent.tx};border-color:${CAT.agent.bd}">${CAT.agent.label}</span>
      <span class="chip" style="background:${CAT.talk.bg};color:${CAT.talk.tx};border-color:${CAT.talk.bd}">${CAT.talk.label}</span>
      <span class="chip" style="background:${CAT.api.bg};color:${CAT.api.tx};border-color:${CAT.api.bd}">${CAT.api.label}</span>
    </div>
    <div style="overflow:auto;padding:10px"><svg width="${W}" height="${H}" style="display:block">${edges}${boxes}</svg></div>
  </div>`;
}
function vizToggle(id){ const n=findNode(id); if(n&&effChildren(n).length){ n._collapsed=!(n._collapsed===true); renderViz($('#content')); } }

/* ---------- templates ---------- */
let tplFilterProfile=''; let tplSearch='';
function renderTemplates(c){
  const profs=allProfiles();
  let list=state.templates;
  if(tplFilterProfile) list=list.filter(t=>t.profile===tplFilterProfile);
  if(tplSearch){ const q=tplSearch.toLowerCase(); list=list.filter(t=>(t.name+t.ivrNo+t.code+t.body+t.profile).toLowerCase().includes(q)); }
  c.innerHTML=`<div class="tplpane">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;max-width:900px;flex-wrap:wrap">
      <b style="font-size:15px">알림톡 템플릿</b>
      <span class="muted" style="font-size:12px">${list.length} / 전체 ${state.templates.length}개 · 업체 ${profs.length}</span>
      <div class="spacer" style="flex:1"></div>
      <select class="btn sm" onchange="tplFilterProfile=this.value;renderTemplates($('#content'))">
        <option value="">전체 업체</option>

function buildLiftRows(s, profile){
  const rows=[]; const profT=state.templates.filter(t=>t.profile===profile);
  const byId=id=>state.templates.find(t=>t.id===id);
  for(const lp of leafPathsEff(s.tree)){
    const entries=lp.node.entries.length?lp.node.entries:[null];
    for(const e of entries){
      let code='', tid='';
      if(e&&e.templateId){ const t=byId(e.templateId);
        if(t){ if(t.profile===profile){ code=t.code; tid=t.id; }
          else { const sib=profT.find(x=>x.ivrNo===t.ivrNo); if(sib){ code=sib.code; tid=sib.id; } } } }
      if(!code){ const bt=bestTemplate(profT, lp.menu, lp.sub, lp.node.label); if(bt){ code=bt.code; tid=bt.id; } }
      rows.push({menu:lp.menu||lp.node.label, sub:lp.sub||'', code, tid, member:e?e.member:'', nodeId:lp.node.id, entryId:e?e.id:''});
    }
  }
  return rows;
}
function liftRowHtml(s,r){
  const profT=state.templates.filter(t=>t.profile===liftProfile);
  const opts=`<option value="">(미지정)</option>`+profT.map(t=>`<option value="${t.id}" ${t.id===r.tid?'selected':''}>${esc((t.code||'?')+' · '+stripIvr(t.name))}</option>`).join('');
  return `<tr>
    <td class="nowrap">${esc(liftProfile)}</td>
    <td class="dim">${esc(s.name)} 문의</td>
    <td>${esc(r.menu)}</td>
    <td>${esc(r.sub||'-')}</td>
    <td><select style="border:1px solid var(--line);border-radius:6px;padding:4px 6px;max-width:260px" onchange="assignLiftCode('${r.nodeId}','${r.entryId}',this.value)">${opts}</select></td>
    <td class="nowrap dim">${esc(r.member||'전체')}</td>
  </tr>`;
}
function assignLiftCode(nodeId,entryId,tid){
  const n=findNode(nodeId); if(!n)return;
  const e=entryId?n.entries.find(x=>x.id===entryId):null;
  if(e){ e.templateId=tid; }
  else { if(!n.entries.length) n.entries.push({id:uid(),member:'전체',action:'',detail:'',url:'',note:'',templateId:tid}); }
  save(); renderLift($('#content'));
}
function liftCsvRows(s,profile){
  const out=[]; const seen=new Set();
  for(const r of buildLiftRows(s,profile)){
    const key=r.menu+'|'+r.sub+'|'+r.code; if(seen.has(key))continue; seen.add(key);
    out.push([profile, s.name+' 문의', r.menu, r.sub||'-', r.code||'', '', '']);
  }
  return out;
}

/* ---------- validation ---------- */
function validate(){
  const issues=[]; // {level, type, msg, serviceId, nodeId}
  let arrowCount=0;
  for(const s of state.services){
    // duplicate sibling numbers
    const checkDup=(list,where)=>{ const seen={}; for(const n of list){ if(n.num){ if(seen[n.num]) issues.push({level:'err',msg:`인입번호 ${n.num} 중복: ‘${seen[n.num]}’ vs ‘${n.label}’`,loc:`${s.name} · ${where}`,serviceId:s.id,nodeId:n.id}); else seen[n.num]=n.label; } checkDup(n.children, where? where+' › '+n.label : n.label); } };
    checkDup(s.tree,'');
    walk(s.tree,(n)=>{
      const path=`${s.name} › ${n.num} ${n.label}`;
      if(n.moduleRef) return;
      if(!effChildren(n).length && n.entries.length===0)
        issues.push({level:'err',msg:`말단 메뉴에 처리(Action)가 없음: ‘${n.label}’`,loc:s.name,serviceId:s.id,nodeId:n.id});
      if(effChildren(n).length===0 && !n.label)
        issues.push({level:'warn',msg:`항목명이 비어있는 말단 메뉴`,loc:s.name,serviceId:s.id,nodeId:n.id});
      n.entries.forEach(e=>{
        if(!e.action) issues.push({level:'err',msg:`Action 비어있음 (${e.member||'전체'})`,loc:path,serviceId:s.id,nodeId:n.id});
        const empty = !e.detail && !e.alimtalk && !e.url && !e.templateId && !e.note;
        if(e.action && empty)
          issues.push({level:'warn',msg:`처리 안내가 비어있음 — 상세·알림톡·URL 중 하나 필요 (${e.member||'전체'})`,loc:path,serviceId:s.id,nodeId:n.id});
        if((s.profiles||[]).length && e.action && /알림톡/.test(e.action) && !e.templateId)
          issues.push({level:'info',msg:`알림톡 발송인데 템플릿코드 미연결 (${e.member||'전체'}) — 리프트양식이 빈칸이 됩니다`,loc:path,serviceId:s.id,nodeId:n.id});
        if(e.templateId){ const t=state.templates.find(x=>x.id===e.templateId);
          if(t && (s.profiles||[]).length && !(s.profiles||[]).includes(t.profile))
            issues.push({level:'warn',msg:`연결된 템플릿 업체(${t.profile})가 서비스 매핑과 다름 (${e.member||'전체'})`,loc:path,serviceId:s.id,nodeId:n.id}); }
        if(e.action && /->/.test(e.action)) arrowCount++;
      });
    });
  }
  if(arrowCount>0) issues.push({level:'info',msg:`화살표 표기 ‘->’ 사용 ${arrowCount}건 — 상단 ‘표기 통일’ 버튼으로 ‘→’로 일괄 정리할 수 있습니다`,loc:'전체',serviceId:'',nodeId:''});
  return issues;
}
function refreshValBadge(){
  const n=validate().filter(i=>i.level==='err').length;

}
function renderValidation(c){
  const issues=validate();
  if(!issues.length){ c.innerHTML=`<div class="valpane"><div class="val-ok">✅ 발견된 문제가 없습니다. 모든 말단 메뉴에 Action이 있고, 알림톡·URL 연결이 정상입니다.</div></div>`; return; }
  const groups={err:[],warn:[],info:[]}; issues.forEach(i=>groups[i.level].push(i));
  const titleMap={err:['오류',' pill-err','반드시 확인'],warn:['주의','pill-warn','권장'],info:['참고','pill-info','선택']};
  let h=`<div class="valpane">`;
  h+=`<div style="display:flex;gap:10px;margin-bottom:18px"><span class="count-pill pill-err">오류 ${groups.err.length}</span><span class="count-pill pill-warn">주의 ${groups.warn.length}</span><span class="count-pill pill-info">참고 ${groups.info.length}</span></div>`;
  for(const lv of ['err','warn','info']){
    if(!groups[lv].length) continue;
    h+=`<div class="val-group"><h3>${titleMap[lv][0]} <span class="count-pill ${titleMap[lv][1]}">${groups[lv].length}</span></h3>`;
    for(const it of groups[lv]){
      h+=`<div class="val-item lv-${lv}" onclick="goTo('${it.serviceId}','${it.nodeId}')"><span>${esc(it.msg)}</span><span class="loc">${esc(it.loc)}</span></div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`; c.innerHTML=h;
}

/* ---------- bulk / normalize ---------- */
function normalizeArrows(){
  let count=0;
  state.services.forEach(s=>walk(s.tree,n=>n.entries.forEach(e=>{
    const before=e.action; const after=(e.action||'').replace(/\s*->\s*/g,' → ').replace(/\s*→\s*/g,' → ').replace(/\s+/g,' ').trim();
    if(after!==before){ e.action=after; count++; }
  })));
  save(); renderAll(); toast(`Action ${count}건의 화살표 표기를 ‘→’로 통일했습니다`);
}

function runBulk(){
  const find=$('#bFind').value; if(!find){ toast('찾을 내용을 입력하세요'); return; }
  const repl=$('#bRepl').value, scope=$('#bScope').value, field=$('#bField').value;
  const svcs= scope==='cur'?[curService()]:state.services; let count=0;
  const rep=v=>{ if(v==null)return v; const nv=v.split(find).join(repl); if(nv!==v)count++; return nv; };
  svcs.forEach(s=>{ if(!s)return; walk(s.tree,n=>{
    if(field==='all'||field==='label') n.label=rep(n.label);
    n.entries.forEach(e=>{
      if(field==='all'||field==='action') e.action=rep(e.action);
      if(field==='all'||field==='detail') e.detail=rep(e.detail);
      if(field==='all'||field==='url') e.url=rep(e.url);
    });
  });});
  closeModal(); save(); renderAll(); toast(`${count}곳을 바꿨습니다`);
}

}
function fmtTs(iso){ try{ const d=new Date(iso); const p=x=>String(x).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }catch(e){ return iso; } }
function histDelta(c,prev){ if(!c) return ''; if(!prev) return `서비스 ${c.services} · 메뉴 ${c.nodes} · 처리 ${c.entries} · 템플릿 ${c.templates} · 공통 IVR ${c.modules}`;
  const parts=[]; const f=(l,a,b)=>{ const d=a-b; if(d) parts.push(`${l} ${d>0?'+':''}${d}`); };
  f('서비스',c.services,prev.services); f('메뉴',c.nodes,prev.nodes); f('처리',c.entries,prev.entries); f('템플릿',c.templates,prev.templates); f('공통 IVR',c.modules,prev.modules);
  return parts.length? ('이전 버전 대비 '+parts.join(', ')) : '항목 수 변화 없음 (내용 수정)'; }
function addHistManual(){ const note=prompt('이력으로 남길 변경 내용'); if(note===null)return; const editor=prompt('편집자 이름',lastEditor())||''; try{localStorage.setItem('ivr_last_editor',editor);}catch(e){} addHistory(editor,note); renderHistory($('#content')); toast('이력을 추가했습니다'); }
function delHist(id){ if(!confirm('이 이력 항목을 삭제할까요?'))return; state.history=(state.history||[]).filter(h=>h.id!==id); save(); renderHistory($('#content')); }
function renderHistory(c){
  const h=(state.history||[]).slice().reverse();
  c.className='content';
  c.innerHTML=`<div class="valpane">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
      <b style="font-size:15px">이력관리 (${(state.history||[]).length})</b>
      <span class="muted" style="font-size:12px">공유본을 발행할 때마다 버전·일시·편집자·변경내용이 기록됩니다.</span>
      <div class="spacer" style="flex:1"></div>
      <button class="btn sm edit-only" onclick="addHistManual()">+ 이력 직접 추가</button>
    </div>
    <div class="hint" style="max-width:920px">이 이력은 발행 시 공유본에 함께 담겨, 도메인(읽기전용)에서도 그대로 보입니다.</div>
    ${h.length? h.map((e,i)=>{ const prev=h[i+1];
      return `<div class="tpl-card" style="max-width:920px">
        <div class="thead"><span class="tno">v${e.ver}</span><span class="tname">${esc(e.note)}</span>
          <div class="spacer" style="flex:1"></div>
          <span class="muted" style="font-size:12px">${esc(fmtTs(e.ts))} · ${esc(e.editor)}</span>
          <button class="btn sm ghost danger edit-only" onclick="delHist('${e.id}')">✕</button></div>
        <div class="muted" style="font-size:11.5px">${esc(histDelta(e.counts, prev&&prev.counts))}</div>
      </div>`; }).join('') : '<div class="insp-empty">아직 발행 이력이 없습니다. 상단 <b>📤 공유본 발행</b> 시 기록됩니다.</div>'}
  </div>`;
}
function stamp(){ const d=new Date(); const p=x=>String(x).padStart(2,'0'); return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`; }
function csvCell(v){ v=(v==null?'':String(v)).replace(/"/g,'""'); return `"${v}"`; }
function exportCSV(){
  const md=Math.max(...state.services.map(maxDepth),1);
  let header=['서비스','대표번호'];
  for(let d=1;d<=md;d++){ header.push(`${d}DEPTH번호`,`${d}DEPTH항목`); }
  header.push('분기조건','멘트','회원구분','조건값','Action','실행상세','템플릿코드','알림톡관리명','버튼URL','비고');
  const lines=[header.map(csvCell).join(',')];
  for(const s of state.services){
    for(const r of flatten(s)){
      const cols=[s.name,s.phone];
      for(let d=1;d<=md;d++){ const seg=r.path[d-1]; cols.push(seg?seg.num:'',seg?seg.label:''); }
      const e=r.e; const tpl=e&&e.templateId?state.templates.find(t=>t.id===e.templateId):null;
      cols.push(r.node.branch||'', r.node.ment||'', e?e.member:'', e?(e.cond||''):'', e?e.action:'', e?e.detail:'', tpl?(tpl.code||''):'', tpl?stripIvr(tpl.name):'', e?e.url:'', e?(e.note||''):'');
      lines.push(cols.map(csvCell).join(','));
    }
  }
  dl('ivr_export_'+stamp()+'.csv','﻿'+lines.join('\r\n'),'text/csv;charset=utf-8'); toast('엑셀용 CSV를 내려받았습니다');
}
function importJSON(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.services)throw 0; state=d; reseedUid(); curServiceId=state.services[0]?.id; curNodeId=null; save(); renderAll(); toast('불러왔습니다'); }catch(e){ alert('올바른 백업 JSON이 아닙니다.'); } };
  r.readAsText(f); ev.target.value=''; }

/* ---------- modal ---------- */
function showModal(html){ $('#modalBox').innerHTML=html; $('#modalBg').classList.add('show'); }
function closeModal(){ $('#modalBg').classList.remove('show'); }
$('#modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg')closeModal(); });

/* ---------- view switch ---------- */
function setView(v){ view=v; document.querySelectorAll('nav.tabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v)); renderAll(); }

/* ---------- boot ---------- */
if(READONLY){ document.body.classList.add('ro'); const tag=$('#savedTag'); if(tag){ tag.textContent='읽기 전용 공유본'; tag.className='ro-badge'; } }
load();
curServiceId=state.services[0]?.id||null;
renderAll();
</script>
